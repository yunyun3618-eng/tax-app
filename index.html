<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI PRO - 確定申告補助</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.1); }
        #lock-screen { position: fixed; inset: 0; z-index: 9999; background: #020617; display: flex; flex-direction: column; items: center; justify-content: center; padding: 2rem; }
        #lock-screen.hidden { display: none !important; }
        .status-pill { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        /* レシート用の縦長フレーム */
        .receipt-guide { width: 80%; height: 75%; border: 2px solid rgba(59, 130, 246, 0.5); border-radius: 1.5rem; position: relative; }
        .corner { position: absolute; width: 20px; height: 20px; border: 4px solid #3b82f6; }
    </style>
</head>
<body class="flex flex-col">

    <div id="lock-screen">
        <div class="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center mb-8 shadow-2xl text-4xl">💳</div>
        <h2 class="text-2xl font-black mb-12">OMNI PRO</h2>
        <a href="https://buy.stripe.com/test_fZu00cclwe2Cd4s6ha8bS00" class="w-full max-w-xs bg-white text-black font-black py-5 rounded-2xl text-center shadow-xl">アクセスを解除</a>
    </div>

    <div class="relative h-[55vh] bg-black">
        <video id="video" class="w-full h-full object-cover" playsinline></video>
        <div id="flash-overlay" class="absolute inset-0 pointer-events-none z-50 transition-opacity duration-200"></div>
        
        <div class="absolute top-0 left-0 right-0 p-5 flex justify-between items-start z-20">
            <div class="status-pill px-4 py-2 rounded-full flex items-center gap-3">
                <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                <span id="ai-msg" class="text-[10px] font-black uppercase tracking-widest text-slate-300">オフライン</span>
            </div>
            <button id="login-btn" onclick="login()" class="bg-blue-600 text-white px-8 py-3 rounded-full text-[12px] font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">Google連携</button>
        </div>

        <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
            <div class="receipt-guide">
                <div class="corner -top-1 -left-1 border-r-0 border-b-0 rounded-tl-lg"></div>
                <div class="corner -top-1 -right-1 border-l-0 border-b-0 rounded-tr-lg"></div>
                <div class="corner -bottom-1 -left-1 border-r-0 border-t-0 rounded-bl-lg"></div>
                <div class="corner -bottom-1 -right-1 border-l-0 border-t-0 rounded-br-lg"></div>
            </div>
        </div>
    </div>

    <div class="flex-1 glass-panel rounded-t-[40px] -mt-8 z-10 flex flex-col shadow-2xl">
        <div id="panel-scroll" class="flex-1 overflow-y-auto px-8 pt-10 pb-4">
            <div id="ui-standby" class="text-center py-6">
                <p id="main-hint" class="text-slate-400 text-xs font-bold tracking-widest">Google連携を完了させてください</p>
            </div>
            <div id="ui-scanning" class="hidden text-center py-6 space-y-4">
                <div class="inline-block w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
                <p class="text-blue-400 text-xs font-bold tracking-widest animate-pulse">レシートを解析中...</p>
            </div>
            <div id="ui-result" class="hidden space-y-6">
                <div class="flex justify-between items-end border-b border-white/10 pb-4">
                    <div><p class="text-[10px] text-slate-500 font-bold">店名</p><h3 id="res-shop" class="text-xl font-bold text-white">---</h3></div>
                    <div class="text-right"><p id="res-date" class="font-mono text-sm text-slate-400">0000/00/00</p></div>
                </div>
                <div class="bg-blue-600/10 rounded-3xl p-6 flex justify-between items-center border border-blue-500/20">
                    <span class="text-xs font-bold text-blue-400">合計金額</span>
                    <span id="res-total" class="text-3xl font-black text-white">¥0</span>
                </div>
            </div>
        </div>
        <div class="p-8 pb-10">
            <button id="save-btn" onclick="saveToSheet()" class="w-full bg-blue-600 h-16 rounded-2xl font-black text-lg text-white disabled:hidden shadow-xl active:scale-95 transition-all" disabled>スプレッドシートに保存</button>
        </div>
    </div>

    <canvas id="cap" class="hidden"></canvas>

    <script>
        const API_KEY = 'AIzaSyBhRkqQT_H3E5H6pItF8_145QZjp1WThsc';
        const CLIENT_ID = '612247786122-mdjm4kcvhj2sjc6dj1h1k9sefou6h9o2.apps.googleusercontent.com';
        const FILE_NAME = '確定申告補助データ_OMNI';
        const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';
        
        let currentData = null, isLock = true, sheetId = null;

        async function init() {
            if (window.location.search.includes('paid=true') || localStorage.getItem('omni_paid') === 'done') {
                localStorage.setItem('omni_paid', 'done');
                document.getElementById('lock-screen').classList.add('hidden');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    document.getElementById('video').srcObject = stream;
                    await document.getElementById('video').play();
                    setInterval(autoCapture, 3000);
                } catch (e) { updateStatus("#ef4444", "カメラ起動失敗"); }
                checkHash();
            }
        }

        function login() {
            const redirectUri = window.location.origin + window.location.pathname;
            location.href = `https://accounts.google.com/o/oauth2/v2/auth?response_type=token&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${encodeURIComponent(SCOPES)}&prompt=select_account`;
        }

        function checkHash() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const token = params.get('access_token');
            if(token) { 
                localStorage.setItem('kh_tok', token); 
                window.history.replaceState(null, null, window.location.pathname);
            }
            if (localStorage.getItem('kh_tok')) setupSheet();
        }

        async function setupSheet() {
            const tok = localStorage.getItem('kh_tok');
            updateStatus("#3b82f6", "接続中...");
            try {
                const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}' and trashed=false`, {
                    headers: {'Authorization': `Bearer ${tok}`}
                });
                const data = await res.json();
                if (data.error) throw new Error();

                if (data.files && data.files.length > 0) {
                    sheetId = data.files[0].id;
                } else {
                    const createRes = await fetch('https://sheets.googleapis.com/v4/spreadsheets', {
                        method: 'POST',
                        headers: {'Authorization': `Bearer ${tok}`, 'Content-Type': 'application/json'},
                        body: JSON.stringify({ properties: { title: FILE_NAME } })
                    });
                    const newSheet = await createRes.json();
                    sheetId = newSheet.spreadsheetId;
                }
                
                // 成功したらログインボタンを消す
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('main-hint').innerText = "レシートを枠内にかざしてください";
                updateStatus("#22c55e", "接続済み");
                isLock = false;
            } catch (e) { 
                localStorage.removeItem('kh_tok');
                updateStatus("#ef4444", "連携が必要です");
                isLock = true;
            }
        }

        async function autoCapture() {
            if (isLock || currentData) return;
            const v = document.getElementById('video'), c = document.getElementById('cap'), ctx = c.getContext('2d');
            c.width = 100; c.height = 100;
            ctx.drawImage(v, 0, 0, 100, 100);
            const pix = ctx.getImageData(0,0,100,100).data;
            let w = 0; for(let i=0; i<pix.length; i+=4) if(pix[i]>200 && pix[i+1]>200 && pix[i+2]>200) w++;
            if (w > 1500) analyze(v);
        }

        async function analyze(video) {
            isLock = true;
            document.getElementById('ui-standby').classList.add('hidden');
            document.getElementById('ui-result').classList.add('hidden');
            document.getElementById('ui-scanning').classList.remove('hidden');
            updateStatus("#f59e0b", "解析中");
            
            const c = document.getElementById('cap'); c.width = video.videoWidth; c.height = video.videoHeight;
            c.getContext('2d').drawImage(video, 0, 0);
            const base64 = c.toDataURL('image/jpeg', 0.8).split(',')[1];
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [
                        { text: "Extract receipt info as JSON strictly in Japanese: {shop:'', date:'', total:0, items:[{category:'', amount:0}]}" },
                        { inline_data: { mime_type: "image/jpeg", data: base64 } }
                    ]}]})
                });
                const json = await res.json();
                const text = json.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
                currentData = JSON.parse(text);
                
                document.getElementById('ui-scanning').classList.add('hidden');
                document.getElementById('ui-result').classList.remove('hidden');
                document.getElementById('res-shop').innerText = currentData.shop || '不明な店舗';
                document.getElementById('res-date').innerText = currentData.date || '----/--/--';
                document.getElementById('res-total').innerText = `¥${(currentData.total || 0).toLocaleString()}`;
                document.getElementById('save-btn').disabled = false;
                updateStatus("#3b82f6", "確認してください");
            } catch (e) { 
                isLock = false; 
                document.getElementById('ui-scanning').classList.add('hidden');
                document.getElementById('ui-standby').classList.remove('hidden');
                updateStatus("#22c55e", "再試行可能");
            }
        }

        async function saveToSheet() {
            const tok = localStorage.getItem('kh_tok');
            const btn = document.getElementById('save-btn');
            btn.innerText = "保存中..."; btn.disabled = true;
            
            const values = currentData.items.map(it => [currentData.date, currentData.shop, it.category, it.amount]);
            try {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/A1:append?valueInputOption=USER_ENTERED`, {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${tok}`, 'Content-Type': 'application/json'},
                    body: JSON.stringify({values})
                });
                btn.innerText = "保存完了！";
                setTimeout(() => {
                    currentData = null;
                    document.getElementById('ui-result').classList.add('hidden');
                    document.getElementById('ui-standby').classList.remove('hidden');
                    btn.innerText = "スプレッドシートに保存";
                    isLock = false;
                }, 1500);
            } catch (e) { btn.disabled = false; btn.innerText = "再試行"; }
        }

        function updateStatus(color, msg) {
            document.getElementById('status-dot').style.backgroundColor = color;
            document.getElementById('ai-msg').innerText = msg;
        }

        window.onload = init;
    </script>
</body>
</html>
